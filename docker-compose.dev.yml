version: "3.9"

# Tryb deweloperski z hot-reload.
# Uruchom: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - warnings-data:/data
      - ./backend/app:/app/app   # Hot-reload: zmiany kodu widoczne bez rebuild
    ports:
      - "8000:8000"              # Bezpośredni dostęp do API + /docs

  frontend-dev:
    image: node:18-alpine
    container_name: meteocap-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm start"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - NODE_OPTIONS=--openssl-legacy-provider
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=3000
    depends_on:
      - backend
    networks:
      - meteocap-net
